<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Soffice Essenza — Mini Pets Collection</title>
<meta name="description" content="The Mini Pets Collection by Soffice Essenza — playful hand-poured candles. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#fdf3ec;--bg2:#fbe6da;--bg3:#f7d6c4;--bg4:#f2c4ad;
  --ink:#b07a5e;--ink-deep:#8a5840;--ink-soft:#cfa088;--pale:#ecceba;
  --gold:#c9a86a;--gold-soft:#e2c994;--gold-deep:#a8843f;
  --serif:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--ink);overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.ocean{position:fixed;inset:0;z-index:-2;background:linear-gradient(180deg,var(--bg1),var(--bg2) 35%,var(--bg3) 70%,var(--bg4))}
#motes{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.mote{position:absolute;animation:float linear infinite;color:var(--gold);opacity:.5;font-size:14px;line-height:1}
@keyframes float{0%{transform:translate(0,0) rotate(0);opacity:0}20%{opacity:.55}80%{opacity:.4}100%{transform:translate(var(--mx),var(--my)) rotate(40deg);opacity:0}}
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:22px clamp(20px,5vw,60px);transition:background .4s,padding .4s}
.nav.scrolled{background:rgba(253,243,236,.78);backdrop-filter:blur(12px);padding-top:14px;padding-bottom:14px}
.brand{font-family:var(--serif);font-size:clamp(20px,2.4vw,26px);font-weight:500;color:var(--ink-deep);line-height:1}
.brand small{display:block;font-family:var(--sans);font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-deep);margin-top:4px}
.collections{display:flex;gap:clamp(14px,2.4vw,32px);align-items:center}
.col-link{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-soft);position:relative;padding:6px 2px;transition:color .25s}
.col-link::after{content:'';position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--gold);transition:width .3s}
.col-link:hover{color:var(--gold-deep)}.col-link:hover::after{width:100%}
.col-link.active{color:var(--ink-deep)}.col-link.active::after{width:100%}
.col-link .soon{display:block;font-size:7px;letter-spacing:2px;color:var(--gold);text-align:center;margin-top:1px}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px}
.eyebrow{font-size:12px;letter-spacing:8px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:26px}
h1{font-family:var(--serif);font-weight:300;color:var(--ink-deep);font-size:clamp(52px,12vw,150px);line-height:.92;letter-spacing:2px}
h1 em{font-style:italic;display:block;font-weight:400}
.sub{margin-top:30px;max-width:520px;font-size:clamp(14px,1.5vw,17px);font-weight:300;line-height:1.9;color:var(--ink)}
.soonbig{margin-top:40px;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--gold);padding:14px 28px;border-radius:40px}
.back{margin-top:30px;font-size:12px;letter-spacing:2px;color:var(--ink-deep);text-transform:uppercase}
.back::after{content:'';display:block;width:0;height:1px;background:var(--gold);transition:width .3s;margin:4px auto 0}
.back:hover::after{width:100%}
@media(max-width:760px){.col-link .soon{display:none}.collections{gap:14px}.col-link{font-size:10px;letter-spacing:1.5px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="ocean"></div>
<div id="motes"></div>
<nav class="nav" id="nav">
  <a class="brand" href="index.html">Soffice Essenza<small>Artisan Candles</small></a>
  <div class="collections">
    <a class="col-link" href="index.html">Abyss</a>
    <a class="col-link active" href="minipets.html">Mini Pets</a>
    <a class="col-link" href="namaste.html">Namastê<span class="soon">soon</span></a>
  </div>
</nav>
<main class="wrap">
  <p class="eyebrow">Collection</p>
  <h1>Mini Pets<em>little companions</em></h1>
  <p class="sub">Soft, playful and full of warmth. Our most adorable collection of hand-poured candles is on its way.</p>
  <span class="soonbig">Coming soon</span>
  <a class="back" href="index.html">← Back to Abyss</a>
</main>
<script>
const nav=document.getElementById('nav');
addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>40),{passive:true});
const motes=document.getElementById('motes');
const SHAPES=['🐾','❤','🐾','✦'];
for(let i=0;i<26;i++){const m=document.createElement('span');m.className='mote';m.textContent=SHAPES[i%SHAPES.length];m.style.fontSize=(10+Math.random()*14)+'px';m.style.left=Math.random()*100+'vw';m.style.top=Math.random()*100+'vh';m.style.setProperty('--mx',(Math.random()*120-60)+'px');m.style.setProperty('--my',(Math.random()*-120-30)+'px');m.style.animationDuration=(14+Math.random()*16)+'s';m.style.animationDelay=(-Math.random()*22)+'s';motes.appendChild(m);}
</script>
</body>
</html>
